name: CI/CD — MotoTrack API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/saas-track-org/tack-core

jobs:

  # ── 1. Testes ───────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mototrack_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/mototrack_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

  # ── 2. Build & Push ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tag.outputs.TAG }}

  # ── 3. Health Check — sobe serviços se necessário ───────────────────────────
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: secrets-back
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Verifica e recupera instância
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/mototrack
            
            docker compose down -v

            echo "=== Status atual ==="
            docker compose ps

            echo "=== Verificando Postgres ==="
            POSTGRES_STATUS=$(docker inspect --format='{{.State.Health.Status}}' mototrack-postgres 2>/dev/null || echo "not_running")
            echo "Postgres: $POSTGRES_STATUS"
            if [ "$POSTGRES_STATUS" != "healthy" ]; then
              echo "⚠ Postgres fora — subindo..."
              docker compose up -d postgres
              sleep 10
            fi

            echo "=== Verificando Nginx ==="
            NGINX_RUNNING=$(docker inspect --format='{{.State.Running}}' mototrack-nginx 2>/dev/null || echo "false")
            echo "Nginx running: $NGINX_RUNNING"
            if [ "$NGINX_RUNNING" != "true" ]; then
              echo "⚠ Nginx fora — subindo..."
              docker compose up -d nginx
              sleep 5
            fi

            echo "=== Verificando HTTPS ==="
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" https://traccks.duckdns.org || echo "000")
            echo "HTTPS response: $HTTP_CODE"

            echo "=== Disco ==="
            df -h /

            echo "=== Memória ==="
            free -m

            echo "=== Status final ==="
            docker compose ps

  # ── 4. Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: health-check
    environment: secrets-back
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/mototrack
            sed -i "s/^API_IMAGE_TAG=.*/API_IMAGE_TAG=${{ steps.tag.outputs.TAG }}/" .env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull api
            docker compose up -d --no-deps api
            docker image prune -f